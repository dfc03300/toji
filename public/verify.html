<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>공시지가 API 검증</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="verify-page">
      <header class="verify-header">
        <div>
          <h1>공시지가 API 검증</h1>
          <p>엑셀에서 사용한 조회조건으로 realtyprice.kr API를 다시 호출합니다.</p>
        </div>
        <a href="https://www.realtyprice.kr/notice/m/gsi/search.do" target="_blank" rel="noreferrer">공식 검색화면 열기</a>
      </header>

      <section class="verify-section">
        <h2>API 호출 정보</h2>
        <dl class="verify-meta">
          <div><dt>방식</dt><dd>POST</dd></div>
          <div><dt>엔드포인트</dt><dd>https://www.realtyprice.kr/notice/m/gsi/getList.do</dd></div>
          <div><dt>상태</dt><dd id="verifyStatus">조회 중</dd></div>
        </dl>
      </section>

      <section class="verify-section">
        <h2>조회조건</h2>
        <pre id="verifyParams"></pre>
      </section>

      <section class="verify-section">
        <h2>조회결과</h2>
        <div class="viewer verify-viewer">
          <table class="sheet-grid verify-grid">
            <thead id="resultHead"></thead>
            <tbody id="resultBody">
              <tr><td class="empty">조회 중입니다.</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="/verify.js"></script>
  </body>
</html>
