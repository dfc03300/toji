<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>공시지가 검색</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="verify-page">
      <header class="verify-header">
        <div>
          <h1>공시지가 검색</h1>
          <p>realtyprice.kr API를 호출해 개별공시지가를 확인합니다.</p>
        </div>
        <a href="/">토지거래 정리로 돌아가기</a>
      </header>

      <section class="verify-section">
        <h2>검색조건</h2>
        <form class="search-form" id="verifyForm">
          <label>
            <span>시도</span>
            <input name="sido_nm" value="서울특별시" />
          </label>
          <label>
            <span>시군구</span>
            <input name="sigungu_nm" value="은평구" />
          </label>
          <label>
            <span>읍면동</span>
            <input name="dongri_nm" value="불광동" />
          </label>
          <label>
            <span>지번</span>
            <input name="jibun" placeholder="예: 520 또는 481-51" />
          </label>
          <label>
            <span>기준연도</span>
            <input name="notice_year" placeholder="전체" />
          </label>
          <button type="submit">검색</button>
        </form>
      </section>

      <section class="verify-section">
        <h2>API 호출 정보</h2>
        <dl class="verify-meta">
          <div><dt>방식</dt><dd>POST</dd></div>
          <div><dt>엔드포인트</dt><dd>https://www.realtyprice.kr/notice/m/gsi/getList.do</dd></div>
          <div><dt>상태</dt><dd id="verifyStatus">대기</dd></div>
        </dl>
      </section>

      <section class="verify-section">
        <h2>실제 요청값</h2>
        <pre id="verifyParams"></pre>
      </section>

      <section class="verify-section">
        <h2>조회결과</h2>
        <div class="viewer verify-viewer">
          <table class="sheet-grid verify-grid">
            <thead id="resultHead"></thead>
            <tbody id="resultBody">
              <tr><td class="empty">검색조건을 입력하고 검색하세요.</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="/verify.js"></script>
  </body>
</html>
