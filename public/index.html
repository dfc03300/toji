<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>토지거래 정리</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <button class="brand-home" type="button" id="brandHomeBtn" aria-label="메인 화면으로">
          <span class="toji-icon">T</span>
          <strong>토지거래 정리</strong>
        </button>

        <label class="file-row" id="dropzone">
          <input id="fileInput" type="file" accept=".xlsx" />
          <strong id="fileName">파일 업로드</strong>
          <small id="fileMeta">.xlsx 파일 선택</small>
        </label>

        <button class="text-button primary" id="processBtn" disabled>파일 분석</button>
        <a class="text-button disabled" id="downloadBtn" href="#" download>엑셀 다운로드</a>

        <div class="secondary-actions">
          <button class="icon-button office-button" type="button" id="officeBtn" aria-label="Office 365에서 편집" title="Office 365에서 편집">
            <svg class="office365-icon" viewBox="0 0 32 32" aria-hidden="true">
              <path fill="#f25022" d="M15.6 2.5 27 6.9v18.2l-11.4 4.4L5 25.8V6.2l10.6-3.7Z" />
              <path fill="#ffb900" d="M15.6 6.1 23.4 9v14l-7.8 2.9-7-2.3V8.4l7-2.3Z" />
              <path fill="#7fba00" d="M15.6 9.4 20 11v10l-4.4 1.6-3.8-1.2v-11l3.8-1Z" />
              <path fill="#00a4ef" d="M15.6 12.2 17.9 13v6l-2.3.8-2-.6v-6.4l2-.6Z" />
            </svg>
          </button>
          <button class="text-button muted" type="button" id="devViewBtn">개발 요청</button>
          <button class="text-button muted" type="button" id="historyViewBtn">작업 히스토리</button>
        </div>
      </aside>

      <section class="workspace" id="mainView">
        <section class="log-area">
          <div class="section-header">
            <strong>처리 로그</strong>
          </div>
          <div class="log-stream" id="logStream" aria-live="polite"></div>
        </section>

        <section class="data-area">
          <div class="section-header">
            <strong>데이터 미리보기</strong>
            <span class="legend"><b>붉은색 텍스트</b> = API로 가져온 정보</span>
          </div>
          <div class="viewer">
            <table class="sheet-grid">
              <thead>
                <tr id="previewHead"></tr>
              </thead>
              <tbody id="previewBody">
                <tr>
                  <td class="empty" colspan="19">업로드 후 결과 미리보기가 표시됩니다.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </section>

      <section class="workspace dev-workspace hidden" id="devView">
        <header class="topbar">
          <div>
            <strong>개발 요청</strong>
          </div>
          <button class="plain-button" type="button" id="backToMainBtn">기존 화면으로</button>
        </header>

        <section class="dev-panel">
          <div class="section-header">
            <strong>기능 요청 게시판</strong>
          </div>
          <div class="board-layout">
            <form class="request-form" id="requestForm">
              <label>
                <span>제목</span>
                <input id="requestTitle" required placeholder="필요한 기능을 짧게 적어주세요" />
              </label>
              <label>
                <span>내용</span>
                <textarea id="requestBody" required placeholder="어떤 상황에서 필요한지, 어떤 결과가 나오면 좋은지 적어주세요"></textarea>
              </label>
              <label>
                <span>이미지 첨부</span>
                <input id="requestImage" type="file" accept="image/*" />
              </label>
              <div class="image-preview" id="imagePreview">첨부 이미지 없음</div>
              <button class="text-button primary" type="submit">게시하기</button>
            </form>

            <div class="request-list">
              <div class="request-list-head">
                <strong>요청 목록</strong>
                <button class="plain-button" type="button" id="clearRequestsBtn">전체 삭제</button>
              </div>
              <div id="requestList"></div>
            </div>
          </div>
        </section>

        <section class="dev-panel">
          <div class="section-header">
            <strong>상세정보 붙여넣기 초안</strong>
          </div>
          <div class="paste-layout">
            <textarea id="detailPaste" placeholder="KAIS 상세정보 창에서 현재데이터 복사 후 여기에 붙여넣는 영역입니다."></textarea>
            <div class="parse-preview">
              <strong>예상 파싱 결과</strong>
              <table>
                <thead>
                  <tr>
                    <th>구분</th>
                    <th>매칭 기준</th>
                    <th>생성 탭</th>
                    <th>상태</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>상세물건정보</td>
                    <td>소재지 + 지번 + 계약일자 + 금액</td>
                    <td>물건상세</td>
                    <td>개발 예정</td>
                  </tr>
                  <tr>
                    <td>매매 및 지분</td>
                    <td>상세물건번호</td>
                    <td>매매및지분</td>
                    <td>개발 예정</td>
                  </tr>
                  <tr>
                    <td>계약조건</td>
                    <td>거래 건 단위</td>
                    <td>계약조건</td>
                    <td>개발 예정</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </section>
      </section>

      <section class="workspace history-workspace hidden" id="historyView">
        <section class="history-panel">
          <div class="history-toolbar">
            <label class="history-upload-button">
              파일 업로드
              <input type="file" id="historyUploadInput" accept=".xlsx" />
            </label>
            <span>작업은 나중에 진행</span>
          </div>
          <div class="history-table-head">
            <span>업로드 파일</span>
            <span>버전</span>
            <span>작업일시</span>
            <span>다운로드 파일</span>
            <span>다운로드</span>
          </div>
          <div class="history-list" id="historyList"></div>
        </section>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
